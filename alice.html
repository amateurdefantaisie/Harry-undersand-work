<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
  authDomain: "harry-undersand.firebaseapp.com",
  projectId: "harry-undersand"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => {

  if (!user) {

    // On mémorise la page actuelle
    sessionStorage.setItem(
      "redirectAfterLogin",
      window.location.pathname
    );

    // Redirection vers accueil
    window.location.href = "/?loginRequired=true";
  }

});

// NEWSLETTER FIREBASE
const form = document.getElementById("newsletter-form");
const message = document.getElementById("newsletter-message");

if (form) {
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const emailInput = document.getElementById("newsletter-email");
    const email = emailInput.value.trim();

    if (!email) return;

    try {
      // Vérifier si déjà inscrit
      const q = query(
        collection(db, "newsletter"),
        where("email", "==", email)
      );

      const querySnapshot = await getDocs(q);

      if (!querySnapshot.empty) {
        message.textContent = "⚠️ Cet email est déjà inscrit.";
        message.style.color = "orange";
        return;
      }

      // Ajouter dans Firestore
      await addDoc(collection(db, "newsletter"), {
        email: email,
        createdAt: new Date()
      });

      message.textContent = "✅ Inscription réussie !";
      message.style.color = "#00ffcc";

      form.reset();

    } catch (error) {
      console.error(error);
      message.textContent = "❌ Erreur, réessayez.";
      message.style.color = "red";
    }
  });
}
</script>
